<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlgoMentor IDE</title>
  <link rel="stylesheet" href="style.css">
  <!-- Monaco AMD loader config MUST come before loader.js -->
  <script>var require = { paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } };</script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
</head>
<body>

  <!-- ═══ Toolbar ════════════════════════════════════════════ -->
  <header class="toolbar" id="toolbar">

    <button class="icon-btn" id="sidebar-toggle" title="Toggle sidebar">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
        <rect x="1" y="2.5" width="14" height="1.5" rx=".75"/>
        <rect x="1" y="7.25" width="14" height="1.5" rx=".75"/>
        <rect x="1" y="12" width="14" height="1.5" rx=".75"/>
      </svg>
    </button>

    <div class="task-pill" id="task-pill">
      <span class="task-dot" id="task-dot"></span>
      <span id="task-label">General Chat</span>
    </div>

    <!-- Editor tabs (hidden until workspace open) -->
    <div class="editor-tabs hidden" id="editor-tabs">
      <button class="etab active" id="tab-code" data-tab="code">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        Code
      </button>
      <button class="etab" id="tab-task" data-tab="task">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Task
      </button>
    </div>

    <div class="toolbar-spacer"></div>

    <!-- File path indicator -->
    <span class="file-indicator" id="file-indicator"></span>

    <!-- Language badge -->
    <button class="lang-badge" id="lang-badge" title="Programming language — click to change in Settings">Python</button>

    <!-- Run controls -->
    <button class="icon-btn" id="watch-btn" title="Watch Mode (Auto-Mentor) - OFF" data-active="false">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
    <button class="run-btn hidden" id="run-btn" title="Run code (F5)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Run
    </button>
    <button class="stop-btn hidden" id="stop-btn" title="Stop" disabled>
      <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    </button>

    <div class="toolbar-sep"></div>

    <button class="icon-btn" id="chat-toggle" title="Toggle chat">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="icon-btn" id="pin-btn" title="Always on top" data-pinned="false">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L8 6H4l4 4-2 8 6-4 6 4-2-8 4-4h-4z"/></svg>
    </button>
    <button class="icon-btn" id="settings-btn" title="Settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>

  </header>

  <!-- ═══ Main workspace ══════════════════════════════════════ -->
  <div class="workspace" id="workspace">

    <!-- ── Left sidebar ───────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <div class="section-label">TASKS</div>
        <div class="task-list" id="task-list">
          <div class="empty-hint" id="task-empty">No tasks yet</div>
        </div>
        <div class="sidebar-footer">
          <button class="sidebar-btn primary-s" id="new-task-btn">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
            New Task
          </button>
          <button class="sidebar-btn" id="workspace-btn">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            Workspace
          </button>
          <div class="ws-label" id="ws-label"></div>
        </div>
      </div>
    </aside>

    <!-- ── Resize handle: sidebar ↔ editor ───────────────── -->
    <div class="vresize" id="vresize-left"></div>

    <!-- ── Editor area ────────────────────────────────────── -->
    <div class="editor-area" id="editor-area">

      <!-- Welcome screen -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🧠</div>
        <h1 class="welcome-title">AlgoMentor IDE</h1>
        <p class="welcome-sub">AI-powered algorithm coding environment</p>
        <button class="primary-btn" id="open-ws-btn">Open Workspace</button>
        <p class="welcome-hint">Select a folder containing your tasks</p>
      </div>

      <!-- Code editor (Monaco) -->
      <div id="monaco-wrap" hidden>
        <div id="monaco-container"></div>
      </div>

      <!-- Task description editor -->
      <div id="task-pane" hidden>
        <div class="task-pane-toolbar">
          <button class="ptab active" id="ptab-edit">Edit</button>
          <button class="ptab" id="ptab-preview">Preview</button>
          <span class="spacer"></span>
          <button class="icon-btn" id="save-desc-btn" title="Save (Ctrl+S)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          </button>
        </div>
        <textarea id="task-editor" class="task-textarea" spellcheck="false" placeholder="# Task title&#10;&#10;Describe the problem here..."></textarea>
        <div id="task-preview" class="task-preview hidden"></div>
      </div>

      <!-- Watch Mode Bubble -->
      <div class="watch-bubble hidden" id="watch-bubble">
        <div class="wb-header">
          <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px; vertical-align:-2px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> Mentor Watch</span>
          <button class="wb-close" id="wb-close">✕</button>
        </div>
        <div class="wb-body" id="wb-body">Thinking...</div>
      </div>

      <!-- ── Horizontal resize handle: editor ↔ output ────── -->
      <div class="hresize" id="hresize-output"></div>

      <!-- ── Output panel ────────────────────────────────── -->
      <div class="output-panel" id="output-panel">
        <div class="output-toolbar">
          <span class="output-label">OUTPUT</span>
          <span class="output-meta" id="output-meta"></span>
          <div class="output-controls">
            <button class="icon-btn xs" id="clear-output" title="Clear">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
            <button class="icon-btn xs" id="toggle-output" title="Collapse/Expand">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="toggle-output-icon"><polyline points="18 15 12 9 6 15"/></svg>
            </button>
          </div>
        </div>
        <div class="output-body" id="output-body">
          <span class="output-hint">▶ Run your code to see output here</span>
        </div>
      </div>

    </div>

    <!-- ── Resize handle: editor ↔ chat ──────────────────── -->
    <div class="vresize" id="vresize-right"></div>

    <!-- ── Chat panel ─────────────────────────────────────── -->
    <aside class="chat-panel" id="chat-panel">
      <div class="messages" id="messages"></div>
      <div class="bottom-bar">
        <div class="action-row" id="action-row">
          <button class="chip" data-cmd="hint">/hint</button>
          <button class="chip" data-cmd="explain">/explain</button>
          <button class="chip" data-cmd="bigo">/bigo</button>
          <button class="chip" data-cmd="approach">/approach</button>
          <button class="chip done" data-cmd="done">✓ done</button>
        </div>
        <div class="input-row">
          <textarea id="input" class="chat-input" placeholder="Ask your mentor…" rows="1" spellcheck="false"></textarea>
          <button class="send-btn" id="send-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </aside>

  </div><!-- .workspace -->

  <!-- ═══ Modals ═════════════════════════════════════════════ -->

  <!-- Settings -->
  <div class="modal-overlay hidden" id="settings-overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Settings</span>
        <button class="icon-btn" id="settings-close">✕</button>
      </div>
      <div class="modal-body">
        <label class="field-label">Provider
          <select id="s-provider"><option value="openai">OpenAI</option><option value="anthropic">Anthropic</option><option value="openrouter">OpenRouter</option><option value="ollama">Ollama (local)</option><option value="lmstudio">LM Studio</option></select>
        </label>
        <label class="field-label">Model<input id="s-model" type="text" placeholder="e.g. gpt-4o"></label>
        <label class="field-label" id="api-key-row">API Key<input id="s-api-key" type="password" placeholder="sk-…"></label>
        <label class="field-label">Programming Language
          <select id="s-prog-lang">
            <option value="python">Python (.py)</option>
            <option value="javascript">JavaScript (.js)</option>
            <option value="typescript">TypeScript (.ts)</option>
            <option value="rust">Rust (.rs)</option>
            <option value="cpp">C++ (.cpp)</option>
            <option value="java">Java (.java)</option>
            <option value="go">Go (.go)</option>
          </select>
        </label>
        <label class="field-label">Response Language
          <select id="s-lang"><option value="en">English</option><option value="uk">Ukrainian</option><option value="ru">Russian</option><option value="auto">Auto-detect</option></select>
        </label>
        <label class="field-label">Mentor Level
          <select id="s-level"><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select>
        </label>
      </div>
      <div class="modal-footer">
        <button class="secondary-btn" id="settings-cancel">Cancel</button>
        <button class="primary-btn" id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <!-- New Task -->
  <div class="modal-overlay hidden" id="newtask-overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">New Task</span>
        <button class="icon-btn" id="newtask-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Task Name / LeetCode URL</label>
          <input type="text" id="nt-name" placeholder="e.g. two-sum OR https://leetcode.com/problems/two-sum/">
          <small style="color:var(--text-3); font-size:11px; margin-top:4px; display:block;">Paste a LeetCode URL to auto-import description and starter code.</small>
        </div>
        <label class="field-label">Category (folder)<input id="nt-category" type="text" placeholder="arrays"></label>
        <label class="field-label">Difficulty
          <select id="nt-difficulty"><option>Easy</option><option selected>Medium</option><option>Hard</option></select>
        </label>
      </div>
      <div class="modal-footer">
        <button class="secondary-btn" id="newtask-cancel">Cancel</button>
        <button class="primary-btn" id="newtask-create">Create</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
